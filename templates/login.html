<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Advisor v2 - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .login-box h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 32px;
            font-weight: 700;
        }

        .login-box p {
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .demo-note {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }

        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🎓</div>
        <h1>Academic Advisor v2</h1>
        <p>7 roles · OpenRouter-powered · Meaningful answers</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Student ID / Email</label>
                <input type="text" id="studentId" placeholder="e.g. STU2024001" required>
            </div>
            <div class="form-group">
                <label>Name (optional)</label>
                <input type="text" id="studentName" placeholder="Your name">
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
            <div class="error" id="errorMsg"></div>
        </form>
        
        <p class="demo-note">Demo: any credentials work</p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const studentId = document.getElementById('studentId').value.trim();
            const studentName = document.getElementById('studentName').value.trim();
            
            if (!studentId) {
                showError('Please enter Student ID');
                return;
            }
            
            // Send login request to backend
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    student_id: studentId,
                    student_name: studentName || 'Student ' + studentId
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Save to localStorage too
                    localStorage.setItem('currentStudent', JSON.stringify({
                        id: studentId,
                        name: studentName || 'Student ' + studentId
                    }));
                    
                    // Redirect to dashboard
                    window.location.href = '/dashboard';
                } else {
                    showError(data.error || 'Login failed');
                }
            })
            .catch(err => {
                console.error('Login error:', err);
                showError('Connection error. Please try again.');
            });
        });

        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
